services:
  # === DC2 Infrastructure ===
  zookeeper-dc2:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: mockbank-zookeeper-dc2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"

  kafka-dc2:
    image: confluentinc/cp-kafka:7.7.0
    container_name: mockbank-kafka-dc2
    depends_on:
      - zookeeper-dc2
    ports:
      - "29093:29093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-dc2:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-dc2:9092,HOST://localhost:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis-dc2:
    image: redis:7
    container_name: mockbank-redis-dc2
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === DC2 Application Services ===
  account-service-dc2:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: mockbank-account-service-dc2
    depends_on:
      postgres:
        condition: service_healthy
      redis-dc2:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker,dc2
    ports:
      - "9081:8081"

  transaction-service-dc2:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    container_name: mockbank-transaction-service-dc2
    depends_on:
      postgres:
        condition: service_healthy
      kafka-dc2:
        condition: service_started
      account-service-dc2:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker,dc2
    ports:
      - "9082:8082"

  notification-service-dc2:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: mockbank-notification-service-dc2
    depends_on:
      kafka-dc2:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker,dc2
    ports:
      - "9083:8083"

  api-gateway-dc2:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: mockbank-api-gateway-dc2
    depends_on:
      redis-dc2:
        condition: service_healthy
      account-service-dc2:
        condition: service_started
      transaction-service-dc2:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker,dc2
    ports:
      - "9080:8080"
