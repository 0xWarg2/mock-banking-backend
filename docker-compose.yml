services:
  # === Infrastructure ===
  postgres:
    image: postgres:16
    container_name: mockbank-postgres
    environment:
      POSTGRES_USER: mockbank
      POSTGRES_PASSWORD: mockbank123
      POSTGRES_DB: account_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./init-db-multisite.sql:/docker-entrypoint-initdb.d/02-init-db-multisite.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockbank"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: mockbank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: mockbank-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7
    container_name: mockbank-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Application Services ===
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: mockbank-account-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker,dc1
    ports:
      - "8081:8081"

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    container_name: mockbank-transaction-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      account-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker,dc1
    ports:
      - "8082:8082"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: mockbank-notification-service
    depends_on:
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker,dc1
    ports:
      - "8083:8083"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: mockbank-api-gateway
    depends_on:
      redis:
        condition: service_healthy
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker,dc1
    ports:
      - "8080:8080"

volumes:
  postgres_data:
